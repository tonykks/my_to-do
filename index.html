<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var pathname = location.pathname;
        if (/\/index\.html?$/i.test(pathname)) {
          pathname = pathname.slice(0, pathname.lastIndexOf("/") + 1);
        } else if (pathname !== "/" && !pathname.endsWith("/")) {
          pathname += "/";
        }
        var el = document.createElement("base");
        el.href = pathname || "/";
        document.head.appendChild(el);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyToDo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>MyToDo App</h1>
      </header>

      <section class="todo-input-section" aria-label="할 일 입력">
        <input
          id="todo-input"
          type="text"
          placeholder="할 일을 입력하세요"
          autocomplete="off"
        />
        <button id="add-btn" type="button">추가</button>
      </section>

      <section class="todo-filter-section" aria-label="목록 필터">
        <div
          id="todo-filter-bar"
          class="todo-filter-bar"
          role="group"
          aria-label="표시할 할 일 범위"
        >
          <button
            type="button"
            class="filter-btn filter-btn--active"
            data-filter="all"
          >
            전체
          </button>
          <button type="button" class="filter-btn" data-filter="active">
            남은 할 일
          </button>
          <button type="button" class="filter-btn" data-filter="completed">
            완료
          </button>
        </div>
      </section>

      <section class="todo-list-section" aria-label="할 일 목록">
        <ul id="todo-list"></ul>
      </section>

      <footer class="todo-status" aria-live="polite">
        <p class="todo-stats">
          <span id="todo-count-completed">완료: 0</span>
          <span class="todo-stats__sep" aria-hidden="true">·</span>
          <span id="todo-count-remaining">남은 할 일: 0</span>
          <span class="todo-stats__sep" aria-hidden="true">·</span>
          <span id="todo-count-total">전체: 0</span>
        </p>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
